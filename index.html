<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTP 3D Cube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="ui-overlay">
        <button id="current-state-indicator" type="button" disabled>Состояние: Этап 1</button>
        <button data-state="1">Этап 1</button>
        <button data-state="2">Этап 2</button>
        <button data-state="3">Этап 3</button>
        <button data-state="4">Этап 4</button>
        <button data-state="5">Этап 5</button>
        <button data-state="6">Собран</button>
        <button data-state="7">Финал</button>
        <button id="toggle-cube-visibility" type="button">Скрыть куб</button>
    </div>
    <div id="toast"></div>
    <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.160.0",
        "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
      }
    }
  </script>
    <script type="module" src="main.js"></script>
</body>

</html>
